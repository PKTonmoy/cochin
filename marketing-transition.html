<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Transition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #080808;
    --mid: #111;
    --white: #f5f0e8;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    cursor: default;
  }

  /* ═══════════════════════════════
     STAGE 1 — VIDEO PLAYER
  ═══════════════════════════════ */
  #stage-video {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark);
    z-index: 20;
  }

  .player-wrap {
    position: relative;
    width: min(780px, 92vw);
    aspect-ratio: 16/9;
    border-radius: 6px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 1px rgba(201,168,76,0.25), 0 40px 100px rgba(0,0,0,0.8);
  }

  /* Simulated cinematic footage */
  .film-grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 150px 150px;
    opacity: 0.5;
    animation: grainShift 0.12s steps(1) infinite;
    pointer-events: none;
    z-index: 5;
  }
  @keyframes grainShift {
    0%  { background-position: 0 0; }
    20% { background-position: -30px 10px; }
    40% { background-position: 10px -20px; }
    60% { background-position: -10px 30px; }
    80% { background-position: 20px -10px; }
    100%{ background-position: 0 0; }
  }

  .video-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 60% 40%,
      #1a1205 0%, #0d0d0d 60%, #000 100%);
    animation: videoPan 6s ease-in-out infinite alternate;
  }
  @keyframes videoPan {
    from { background-position: 0% 50%; }
    to   { background-position: 100% 50%; }
  }

  /* Fake scene silhouette */
  .scene-silhouette {
    position: absolute; inset: 0;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }
  .city-svg { width: 100%; height: 60%; opacity: 0.35; }

  /* Letterbox bars */
  .bar-top, .bar-bottom {
    position: absolute; left: 0; right: 0; height: 11%;
    background: #000; z-index: 4;
  }
  .bar-top { top: 0; }
  .bar-bottom { bottom: 0; }

  /* Video label */
  .v-label {
    position: absolute; top: 14%; left: 0; right: 0;
    text-align: center; z-index: 6;
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(22px, 4vw, 42px);
    letter-spacing: 6px;
    color: var(--white);
    opacity: 0.18;
  }

  /* Timecode */
  .timecode {
    position: absolute; bottom: 13%; left: 20px; z-index: 6;
    font-family: monospace; font-size: 11px;
    color: rgba(255,255,255,0.25); letter-spacing: 2px;
  }

  /* Progress bar */
  .v-progress-track {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.1); z-index: 6;
  }
  .v-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    animation: progressFill 5s linear forwards;
    animation-delay: 0.3s;
  }
  @keyframes progressFill {
    to { width: 100%; }
  }

  /* ═══════════════════════════════
     STAGE 2 — TRANSITION LAYERS
  ═══════════════════════════════ */

  /* Layer A: white flash */
  #flash {
    position: fixed; inset: 0; z-index: 90;
    background: var(--white);
    opacity: 0; pointer-events: none;
  }

  /* Layer B: horizontal wipe blades */
  #blades {
    position: fixed; inset: 0; z-index: 80;
    display: flex; flex-direction: column;
    pointer-events: none;
  }
  .blade {
    flex: 1;
    background: var(--dark);
    transform: scaleX(0);
    transform-origin: left center;
  }

  /* Layer C: golden particle burst */
  #particles {
    position: fixed; inset: 0; z-index: 85;
    pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
  }

  /* Layer D: radial reveal mask */
  #reveal-ring {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--dark);
    z-index: 75;
    pointer-events: none;
  }

  /* ═══════════════════════════════
     STAGE 3 — WEBSITE
  ═══════════════════════════════ */
  #stage-site {
    position: fixed; inset: 0; z-index: 10;
    background: var(--dark);
    opacity: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* Textured noise overlay */
  #stage-site::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }

  /* Thin horizontal scan lines */
  #stage-site::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow corners */
  .glow-tl {
    position: absolute; top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 65%);
    pointer-events: none; z-index: 1;
    animation: glowPulse 5s ease-in-out infinite;
  }
  .glow-br {
    position: absolute; bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 65%);
    pointer-events: none; z-index: 1;
    animation: glowPulse 7s ease-in-out infinite reverse;
  }
  @keyframes glowPulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%     { opacity: 0.6; transform: scale(1.15); }
  }

  /* Thin gold rule lines decorative */
  .h-rule {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  }
  .h-rule.top    { top: 60px; }
  .h-rule.bottom { bottom: 60px; }

  .v-rule {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(201,168,76,0.2), transparent);
  }
  .v-rule.left  { left: 60px; }
  .v-rule.right { right: 60px; }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 28px; height: 28px;
    opacity: 0.4;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--gold);
  }
  .corner::before { width: 100%; height: 1.5px; top: 0; }
  .corner::after  { width: 1.5px; height: 100%; left: 0; }
  .corner.tl { top: 40px; left: 40px; }
  .corner.tr { top: 40px; right: 40px; transform: scaleX(-1); }
  .corner.bl { bottom: 40px; left: 40px; transform: scaleY(-1); }
  .corner.br { bottom: 40px; right: 40px; transform: scale(-1); }

  /* ── Hero typography ── */
  .hero { position: relative; z-index: 2; text-align: center; padding: 30px 24px; }

  .overline {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0; transform: translateY(18px);
  }
  .overline-dash {
    display: block; width: 32px; height: 1px; background: var(--gold); opacity: 0.6;
  }

  .main-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(58px, 11vw, 130px);
    letter-spacing: 4px;
    line-height: 0.92;
    color: var(--white);
    margin-bottom: 6px;
    opacity: 0; transform: translateY(24px);
  }

  .title-accent {
    display: block;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% auto;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    from { background-position: 0% center; }
    to   { background-position: 200% center; }
  }

  .subtitle {
    font-size: clamp(13px, 1.8vw, 16px);
    color: rgba(245,240,232,0.4);
    letter-spacing: 1.5px;
    font-weight: 300;
    margin-top: 20px; margin-bottom: 48px;
    max-width: 420px; margin-left: auto; margin-right: auto;
    line-height: 1.8;
    opacity: 0; transform: translateY(18px);
  }

  .cta-row {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    flex-wrap: wrap;
    opacity: 0; transform: translateY(18px);
  }

  .btn-gold {
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    background-size: 200% auto;
    border: none; border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--dark);
    cursor: pointer;
    transition: background-position 0.4s ease, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(201,168,76,0.25);
  }
  .btn-gold:hover {
    background-position: right center;
    transform: translateY(-2px);
    box-shadow: 0 8px 36px rgba(201,168,76,0.45);
  }

  .btn-outline {
    padding: 13px 40px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(245,240,232,0.55);
    cursor: pointer;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
  }
  .btn-outline:hover {
    border-color: rgba(201,168,76,0.7);
    color: var(--gold);
    background: rgba(201,168,76,0.04);
  }

  /* Stats row */
  .stats {
    display: flex; gap: 56px; justify-content: center; flex-wrap: wrap;
    margin-top: 72px;
    opacity: 0; transform: translateY(18px);
  }
  .stat { text-align: center; }
  .stat-number {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(32px, 5vw, 52px);
    color: var(--white);
    letter-spacing: 2px;
    line-height: 1;
  }
  .stat-unit { color: var(--gold); font-size: 0.7em; }
  .stat-label {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
    margin-top: 6px;
  }
  .stat-divider {
    width: 1px; background: rgba(201,168,76,0.2);
    align-self: stretch; margin: 4px 0;
  }

  /* Replay */
  #replay-btn {
    position: fixed; bottom: 28px; right: 28px;
    z-index: 200;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 20px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    cursor: pointer;
    opacity: 0;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  #replay-btn:hover {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border-color: rgba(201,168,76,0.5);
  }

</style>
</head>
<body>

<!-- ══ STAGE 1: VIDEO ══════════════════════════════════════ -->
<div id="stage-video">
  <div class="player-wrap">
    <div class="bar-top"></div>
    <div class="bar-bottom"></div>
    <div class="video-bg"></div>

    <!-- City silhouette SVG -->
    <div class="scene-silhouette">
      <svg class="city-svg" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" fill="var(--dark)">
        <!-- buildings -->
        <rect x="0"   y="180" width="60"  height="120"/>
        <rect x="20"  y="140" width="30"  height="40"/>
        <rect x="70"  y="160" width="50"  height="140"/>
        <rect x="90"  y="120" width="20"  height="40"/>
        <rect x="130" y="100" width="70"  height="200"/>
        <rect x="155" y="60"  width="20"  height="40"/>
        <rect x="210" y="140" width="45"  height="160"/>
        <rect x="265" y="80"  width="60"  height="220"/>
        <rect x="280" y="40"  width="20"  height="40"/>
        <rect x="335" y="130" width="40"  height="170"/>
        <rect x="385" y="90"  width="80"  height="210"/>
        <rect x="420" y="50"  width="15"  height="40"/>
        <rect x="475" y="155" width="50"  height="145"/>
        <rect x="535" y="100" width="65"  height="200"/>
        <rect x="560" y="60"  width="20"  height="40"/>
        <rect x="610" y="145" width="45"  height="155"/>
        <rect x="665" y="115" width="55"  height="185"/>
        <rect x="730" y="140" width="40"  height="160"/>
        <rect x="780" y="170" width="60"  height="130"/>
        <!-- ground -->
        <rect x="0"   y="298" width="800" height="10"/>
      </svg>
    </div>

    <div class="film-grain"></div>
    <span class="v-label">Your Film Here</span>
    <span class="timecode">00:02:48:14</span>

    <div class="v-progress-track">
      <div class="v-progress-fill"></div>
    </div>
  </div>
</div>

<!-- ══ TRANSITION LAYERS ═══════════════════════════════════ -->
<div id="flash"></div>
<div id="reveal-ring"></div>
<div id="blades">
  <div class="blade"></div><div class="blade"></div>
  <div class="blade"></div><div class="blade"></div>
  <div class="blade"></div><div class="blade"></div>
  <div class="blade"></div><div class="blade"></div>
</div>
<div id="particles"></div>

<!-- ══ STAGE 3: WEBSITE ════════════════════════════════════ -->
<div id="stage-site">
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="h-rule top"></div>
  <div class="h-rule bottom"></div>
  <div class="v-rule left"></div>
  <div class="v-rule right"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="hero">
    <div class="overline">
      <span class="overline-dash"></span>
      Established 2024
      <span class="overline-dash"></span>
    </div>
    <h1 class="main-title">
      We Create<br>
      <span class="title-accent">The Future</span>
    </h1>
    <p class="subtitle">
      Bold ideas. Refined execution.<br>
      Stories that move people to act.
    </p>
    <div class="cta-row">
      <button class="btn-gold">Start a Project</button>
      <button class="btn-outline">View Showreel</button>

    <div class="stats">
      <div class="stat">
        <div class="stat-number">12<span class="stat-unit">K+</span></div>
        <div class="stat-label">Clients</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-number">98<span class="stat-unit">%</span></div>
        <div class="stat-label">Satisfaction</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-number">40<span class="stat-unit">+</span></div>
        <div class="stat-label">Awards</div>
      </div>
    </div>
  </div>
</div>

<!-- Replay -->
<button id="replay-btn">↺ &nbsp;Replay</button>

<script>
/* ─────────────────────────────────────────────────────
   Utility: animate a value over time
───────────────────────────────────────────────────── */
function tween(from, to, dur, ease, onUpdate, onDone) {
  const start = performance.now();
  function step(now) {
    let t = Math.min((now - start) / dur, 1);
    // ease functions
    if (ease === 'out3') t = 1 - Math.pow(1-t, 3);
    if (ease === 'in2')  t = t * t;
    if (ease === 'out2') t = 1 - (1-t)*(1-t);
    if (ease === 'io3')  t = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    onUpdate(from + (to-from)*t);
    if (t < 1) requestAnimationFrame(step);
    else if (onDone) onDone();
  }
  requestAnimationFrame(step);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ─────────────────────────────────────────────────────
   Build particles
───────────────────────────────────────────────────── */
function spawnParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  const count = 55;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 6;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:50%; top:50%;
      background: ${Math.random()>0.4 ? '#c9a84c' : '#f0d080'};
      box-shadow: 0 0 ${size*2}px rgba(201,168,76,0.8);
    `;
    container.appendChild(p);

    const angle = (i / count) * Math.PI * 2 + (Math.random()-0.5)*0.4;
    const dist  = 160 + Math.random() * 380;
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist;
    const delay = Math.random() * 180;

    setTimeout(() => {
      p.style.opacity = '1';
      p.style.transition = `transform ${0.6 + Math.random()*0.5}s cubic-bezier(0.1,0.9,0.3,1), opacity 0.4s ease ${0.3 + Math.random()*0.3}s`;
      p.style.transform  = `translate(calc(${tx}px - 50%), calc(${ty}px - 50%))`;
      setTimeout(() => { p.style.opacity = '0'; }, 500);
    }, delay);
  }
}

/* ─────────────────────────────────────────────────────
   Hero element staggered reveal
───────────────────────────────────────────────────── */
function revealHero() {
  const els = [
    { el: document.querySelector('.overline'), delay: 0 },
    { el: document.querySelector('.main-title'), delay: 120 },
    { el: document.querySelector('.subtitle'), delay: 260 },
    { el: document.querySelector('.cta-row'), delay: 400 },
    { el: document.querySelector('.stats'), delay: 560 },
  ];
  els.forEach(({el, delay}) => {
    setTimeout(() => {
      el.style.transition = 'opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, delay);
  });
}

/* ─────────────────────────────────────────────────────
   Main transition sequence
───────────────────────────────────────────────────── */
async function runTransition() {
  const flash       = document.getElementById('flash');
  const blades      = document.querySelectorAll('.blade');
  const revealRing  = document.getElementById('reveal-ring');
  const stageVideo  = document.getElementById('stage-video');
  const stageSite   = document.getElementById('stage-site');
  const replayBtn   = document.getElementById('replay-btn');

  // ── 1. White flash on video end ──
  await wait(5200);
  flash.style.transition = 'opacity 0.08s ease';
  flash.style.opacity = '1';
  await wait(80);
  flash.style.transition = 'opacity 0.3s ease';
  flash.style.opacity = '0';

  // ── 2. Blades sweep in (left to right) ──
  await wait(60);
  blades.forEach((b, i) => {
    b.style.transition = `transform 0.38s cubic-bezier(0.77,0,0.18,1) ${i*0.025}s`;
    b.style.transform = 'scaleX(1)';
  });
  stageVideo.style.transition = 'opacity 0.2s ease';
  stageVideo.style.opacity = '0';
  await wait(420);

  // ── 3. Radial ring expands (blades disappear behind it) ──
  revealRing.style.transition = 'transform 0.7s cubic-bezier(0.22,1,0.36,1)';
  revealRing.style.transform  = 'translate(-50%,-50%) scale(220)';
  await wait(160);

  // ── 4. Particle burst ──
  spawnParticles();

  // ── 5. Site fades in ──
  await wait(200);
  stageSite.style.transition = 'opacity 0.4s ease';
  stageSite.style.opacity = '1';

  // ── 6. Blades sweep OUT (right to left) ──
  blades.forEach((b, i) => {
    const ri = blades.length - 1 - i;
    b.style.transition = `transform 0.4s cubic-bezier(0.77,0,0.18,1) ${ri*0.025}s`;
    b.style.transform = 'scaleX(0)';
    b.style.transformOrigin = 'right center';
  });
  await wait(100);

  // ── 7. Ring fades away ──
  revealRing.style.transition = 'opacity 0.3s ease';
  revealRing.style.opacity = '0';
  await wait(200);

  // ── 8. Hero text stagger ──
  revealHero();

  // ── 9. Replay button ──
  await wait(1000);
  replayBtn.style.opacity = '1';

  // hide video stage fully
  stageVideo.style.display = 'none';
}

/* ─────────────────────────────────────────────────────
   Reset & Replay
───────────────────────────────────────────────────── */
function reset() {
  const flash      = document.getElementById('flash');
  const blades     = document.querySelectorAll('.blade');
  const revealRing = document.getElementById('reveal-ring');
  const stageVideo = document.getElementById('stage-video');
  const stageSite  = document.getElementById('stage-site');
  const replayBtn  = document.getElementById('replay-btn');

  // Reset all
  stageVideo.style.display = '';
  stageVideo.style.opacity = '1';
  stageVideo.style.transition = '';
  stageSite.style.opacity = '0';
  stageSite.style.transition = '';
  flash.style.opacity = '0';
  flash.style.transition = '';
  revealRing.style.transform = 'translate(-50%,-50%) scale(0)';
  revealRing.style.opacity   = '1';
  revealRing.style.transition = '';
  replayBtn.style.opacity = '0';

  blades.forEach(b => {
    b.style.transition = '';
    b.style.transform = 'scaleX(0)';
    b.style.transformOrigin = 'left center';
  });

  // Reset hero text
  document.querySelectorAll('.overline, .main-title, .subtitle, .cta-row, .stats').forEach(el => {
    el.style.transition = '';
    el.style.opacity = '0';
    el.style.transform = el.classList.contains('stats') ? 'translateY(18px)' : 'translateY(18px)';
  });

  // Reset progress bar
  const fill = document.querySelector('.v-progress-fill');
  fill.style.animation = 'none';
  fill.offsetHeight; // reflow
  fill.style.animation = '';

  document.getElementById('particles').innerHTML = '';

  setTimeout(runTransition, 400);
}

document.getElementById('replay-btn').addEventListener('click', reset);

// ── Start ──
runTransition();
</script>
</body>
</html>
